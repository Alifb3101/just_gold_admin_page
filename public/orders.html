<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Just Gold Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="orders.css">
</head>
<body>

<!-- Role-based Navigation -->
<nav class="admin-nav" id="adminNav">
  <div class="nav-brand">
    <span class="nav-logo">👑</span>
    <span>Just Gold Admin</span>
  </div>
  <div class="nav-menu" id="navMenu"></div>
  <div class="nav-user">
    <span id="userRoleBadge" class="user-role"></span>
    <span id="userName"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <header class="hero">
    <div>
      <p class="eyebrow">ADMIN</p>
      <h1>Orders</h1>
      <p class="subtitle">View and manage customer orders, update statuses, and track fulfillment.</p>
    </div>
    <div class="hero-actions">
      <a href="index.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
        Products
      </a>
      <a href="contact-queries.html" class="nav-btn" data-role="admin,viewer">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
        Queries
      </a>
      <a href="users.html" class="nav-btn" data-role="admin">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Users
      </a>
      <div class="hero-chip">
        <span>Order Management</span>
        <strong id="orderCount">Loading...</strong>
      </div>
    </div>
  </header>

  <main class="orders-layout">
    <!-- Filters Section -->
    <section class="filters-panel panel">
      <h2>Filters</h2>
      
      <label class="field">
        <span>Search</span>
        <input type="text" id="searchInput" placeholder="Order #, customer name, email...">
      </label>

      <label class="field">
        <span>Order Status</span>
        <select id="orderStatusFilter">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="processing">Processing</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </label>

      <label class="field">
        <span>Payment Status</span>
        <select id="paymentStatusFilter">
          <option value="">All</option>
          <option value="pending">Pending</option>
          <option value="paid">Paid</option>
          <option value="failed">Failed</option>
          <option value="refunded">Refunded</option>
        </select>
      </label>

      <label class="field">
        <span>Payment Method</span>
        <select id="paymentMethodFilter">
          <option value="">All</option>
          <option value="stripe">Stripe</option>
          <option value="cod">Cash on Delivery</option>
        </select>
      </label>

      <label class="field">
        <span>Date From</span>
        <input type="date" id="dateFrom">
      </label>

      <label class="field">
        <span>Date To</span>
        <input type="date" id="dateTo">
      </label>

      <button type="button" class="btn btn-primary" id="applyFilters">Apply Filters</button>
      <button type="button" class="btn btn-secondary" id="clearFilters">Clear</button>
    </section>

    <!-- Orders List -->
    <section class="orders-panel panel">
      <div class="section-head">
        <h2>Recent Orders</h2>
        <div class="pagination-info">
          <span id="paginationInfo">Page 1</span>
        </div>
      </div>

      <div class="orders-table-wrapper">
        <table class="orders-table">
          <thead>
            <tr>
              <th>Order #</th>
              <th>Customer</th>
              <th>Date</th>
              <th>Status</th>
              <th>Payment</th>
              <th>Total</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="ordersTableBody">
            <tr>
              <td colspan="7" class="loading-cell">Loading orders...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button type="button" class="btn btn-secondary" id="prevPage" disabled>Previous</button>
        <span id="pageNumbers"></span>
        <button type="button" class="btn btn-secondary" id="nextPage">Next</button>
      </div>
    </section>
  </main>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalOrderNumber">Order Details</h2>
      <button type="button" class="close-btn" id="closeModal">&times;</button>
    </div>
    <div class="modal-body" id="orderDetailContent">
      Loading...
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" id="closeModalBtn">Close</button>
    </div>
  </div>
</div>

<script src="auth-config.js"></script>
<script>
  // Protect route - admin, order_manager, and viewer can access orders
  protectRoute('admin');
  
  // Initialize RBAC on page load
  document.addEventListener('DOMContentLoaded', () => {
    // Initialize role-based access control
    initRBAC();
    
    // Render navigation menu based on role
    renderMenu('navMenu');
    
    // Display user info
    const user = getAdminUser();
    if (user) {
      const roleInfo = getRoleInfo(user.role);
      const roleBadge = document.getElementById('userRoleBadge');
      if (roleBadge) {
        roleBadge.textContent = roleInfo.label;
        roleBadge.style.background = roleInfo.color + '20';
        roleBadge.style.color = roleInfo.color;
      }
      
      const userName = document.getElementById('userName');
      if (userName) {
        userName.textContent = user.email;
      }
    }
  });
</script>
<script src="orders.js"></script>
</body>
</html>
