<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - Just Gold Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .users-table-wrapper {
      overflow-x: auto;
    }
    
    .users-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    
    .users-table th,
    .users-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    
    .users-table th {
      background: linear-gradient(120deg, #fff1d2 0%, #f6ddbf 100%);
      font-weight: 600;
      color: var(--accent-dark);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .users-table tr:hover {
      background: #fffaf4;
    }
    
    .role-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .role-badge.admin {
      background: #fce4e1;
      color: #c0392b;
    }
    
    .role-badge.inventory_manager {
      background: #e8f8f5;
      color: #27ae60;
    }
    
    .role-badge.order_manager {
      background: #e3f2fd;
      color: #1976d2;
    }
    
    .role-badge.customer {
      background: #e8f5e9;
      color: #2e7d32;
    }
    
    .role-badge.staff {
      background: #fff3e0;
      color: #f57c00;
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    .status-badge.active {
      background: #e8f8f5;
      color: #27ae60;
    }
    
    .status-badge.inactive {
      background: #fce4e1;
      color: #c0392b;
    }
    
    .action-btns {
      display: flex;
      gap: 8px;
    }
    
    .action-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .action-btn:hover {
      opacity: 0.8;
    }
    
    .action-btn.edit {
      background: #e3f2fd;
      color: #1976d2;
    }
    
    .action-btn.toggle {
      background: #fff3e0;
      color: #f57c00;
    }
    
    .action-btn.delete {
      background: #ffebee;
      color: #d32f2f;
    }
    
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(31, 28, 24, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: var(--surface);
      border-radius: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 30px 60px rgba(35, 24, 16, 0.25);
    }
    
    .modal-header {
      background: linear-gradient(120deg, #fff1d2 0%, #f6ddbf 100%);
      padding: 20px 24px;
      border-radius: 20px 20px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-header h2 {
      font-family: "Unbounded", sans-serif;
      font-size: 1.3rem;
      margin: 0;
    }
    
    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--muted);
    }
    
    .modal-body {
      padding: 24px;
    }
    
    .modal-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    
    .role-select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      background: #fffefb;
    }
    
    .role-option {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .role-option:hover {
      border-color: var(--accent);
      background: #fffaf4;
    }
    
    .role-option.selected {
      border-color: var(--accent);
      background: linear-gradient(120deg, #fff1d2 0%, #f6ddbf 100%);
    }
    
    .role-option h4 {
      margin: 0 0 4px 0;
      font-size: 0.95rem;
    }
    
    .role-option p {
      margin: 0;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<!-- Role-based Navigation -->
<nav class="admin-nav" id="adminNav">
  <div class="nav-brand">
    <span class="nav-logo">👑</span>
    <span>Just Gold Admin</span>
  </div>
  <div class="nav-menu" id="navMenu"></div>
  <div class="nav-user">
    <span id="userRoleBadge" class="user-role"></span>
    <span id="userName"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <header class="hero">
    <div>
      <p class="eyebrow">ADMIN</p>
      <h1>User Management</h1>
      <p class="subtitle">Manage staff users and their access levels.</p>
    </div>
    <div class="hero-actions">
      <a href="index.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
        Products
      </a>
      <a href="orders.html" class="nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        Orders
      </a>
      <button class="btn btn-primary" id="addUserBtn" onclick="openCreateModal()">
        + Add User
      </button>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="section-head">
        <h2>All Users</h2>
        <span id="userCount" class="meta">Loading...</span>
      </div>

      <div class="users-table-wrapper">
        <table class="users-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Role</th>
              <th>Status</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr>
              <td colspan="7" style="text-align: center; padding: 40px;">Loading users...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<!-- Create User Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Create New User</h2>
      <button class="modal-close" onclick="closeCreateModal()">&times;</button>
    </div>
    <div class="modal-body">
      <label class="field">
        <span>Name</span>
        <input type="text" id="newUserName" placeholder="John Doe">
      </label>
      <label class="field">
        <span>Email *</span>
        <input type="email" id="newUserEmail" placeholder="user@example.com" required>
      </label>
      <label class="field">
        <span>Password *</span>
        <input type="password" id="newUserPassword" placeholder="Min 6 characters" required minlength="6">
      </label>
      <label class="field">
        <span>Phone</span>
        <input type="tel" id="newUserPhone" placeholder="+971501234567">
      </label>
      <label class="field">
        <span>Role</span>
        <select id="newUserRole" class="role-select">
          <option value="user">User</option>
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createUser()">Create User</button>
    </div>
  </div>
</div>

<!-- Edit User Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Edit User</h2>
      <button class="modal-close" onclick="closeEditModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editUserId">
      <label class="field">
        <span>Name</span>
        <input type="text" id="editUserName" required>
      </label>
      <label class="field">
        <span>Email</span>
        <input type="email" id="editUserEmail" disabled style="background: #f5f5f5;">
        <p class="meta">Email cannot be changed</p>
      </label>
      <label class="field">
        <span>Role</span>
        <select id="editUserRole" class="role-select">
          <option value="admin">Admin</option>
          <option value="staff">Staff</option>
          <option value="user">User</option>
          <option value="customer">Customer</option>
        </select>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" onclick="updateUser()">Save Changes</button>
    </div>
  </div>
</div>

<script src="auth-config.js"></script>
<script>
  // Protect route - admin only
  protectRoute('admin');
  
  let users = [];
  let editingUserId = null;
  
  // Load users on page load
  document.addEventListener('DOMContentLoaded', () => {
    loadUsers();
    initializeNavigation();
    // Add User button only for admin
    const addUserBtn = document.getElementById('addUserBtn');
    if (addUserBtn) {
      addUserBtn.style.display = 'inline-flex';
    }
  });
  
  async function loadUsers() {
    const token = localStorage.getItem('adminToken');
    if (!token) {
      window.location.href = '/login.html';
      return;
    }

    try {
      const response = await fetch(`${API_BASE}/users?limit=50&offset=0`, {
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      });
      
      if (!response.ok) throw new Error('Failed to load users');
      
      const data = await response.json();
      console.log('API Response:', data);
      users = data.data || [];
      document.getElementById('userCount').textContent = `${data.total || users.length} users`;
      renderUsers();
    } catch (error) {
      console.error('Error loading users:', error);
      document.getElementById('usersTableBody').innerHTML = `
        <tr><td colspan="7" style="text-align: center; padding: 40px; color: #e74c3c;">
          Error loading users. Please try again.
        </td></tr>
      `;
    }
  }
  
  function renderUsers() {
    const tbody = document.getElementById('usersTableBody');
    
    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;">No users found</td></tr>';
      return;
    }
    
    tbody.innerHTML = users.map(user => {
      console.log('User:', user.email, 'Role from API:', user.role);
      const roleInfo = getRoleInfo(user.role) || { label: user.role };
      console.log('Role info label:', roleInfo.label);
      const createdAt = user.created_at ? new Date(user.created_at).toLocaleDateString() : 'N/A';
      const phone = user.phone || '-';
      
      return `
        <tr>
          <td><strong>${escapeHtml(user.name)}</strong></td>
          <td>${escapeHtml(user.email)}</td>
          <td>${escapeHtml(phone)}</td>
          <td><span class="role-badge ${user.role}">${roleInfo.label}</span></td>
          <td><span class="status-badge ${user.is_active ? 'active' : 'inactive'}">${user.is_active ? 'Active' : 'Inactive'}</span></td>
          <td class="meta">${createdAt}</td>
          <td>
            <div class="action-btns">
              <button class="action-btn edit" onclick="openEditModal(${user.id})">Edit</button>
              <button class="action-btn delete" onclick="deleteUser(${user.id})">Delete</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }
  
  function openCreateModal() {
    document.getElementById('newUserName').value = '';
    document.getElementById('newUserEmail').value = '';
    document.getElementById('newUserPassword').value = '';
    document.getElementById('newUserPhone').value = '';
    document.getElementById('newUserRole').value = 'user';
    document.getElementById('createModal').classList.add('active');
  }
  
  function closeCreateModal() {
    document.getElementById('createModal').classList.remove('active');
  }
  
  async function createUser() {
    const name = document.getElementById('newUserName').value.trim();
    const email = document.getElementById('newUserEmail').value.trim();
    const password = document.getElementById('newUserPassword').value;
    const phone = document.getElementById('newUserPhone').value.trim();
    const role = document.getElementById('newUserRole').value;
    
    if (!email || !password) {
      alert('Email and password are required');
      return;
    }
    
    if (password.length < 6) {
      alert('Password must be at least 6 characters');
      return;
    }
    
    const token = localStorage.getItem('adminToken');
    if (!token) return;
    
    try {
      const response = await fetch(`${API_BASE}/users`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ 
          name: name || undefined, 
          email, 
          password, 
          phone: phone || undefined, 
          role 
        })
      });
      
      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.message || 'Failed to create user');
      }
      
      alert('User created successfully');
      closeCreateModal();
      loadUsers();
    } catch (error) {
      console.error('Error creating user:', error);
      alert(error.message || 'Failed to create user');
    }
  }
  
  function openEditModal(userId) {
    const user = users.find(u => u.id === userId);
    if (!user) return;
    
    editingUserId = userId;
    document.getElementById('editUserId').value = userId;
    document.getElementById('editUserName').value = user.name;
    document.getElementById('editUserEmail').value = user.email;
    document.getElementById('editUserRole').value = user.role;
    
    document.getElementById('editModal').classList.add('active');
  }
  
  function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
    editingUserId = null;
  }
  
  async function updateUser() {
    if (!editingUserId) return;
    
    const name = document.getElementById('editUserName').value.trim();
    const role = document.getElementById('editUserRole').value;
    
    if (!name) {
      alert('Name is required');
      return;
    }
    
    const token = localStorage.getItem('adminToken');
    if (!token) return;
    
    try {
      // Update role using the new API
      const response = await fetch(`${API_BASE}/users/${editingUserId}/role`, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ role: role })
      });
      
      if (!response.ok) throw new Error('Failed to update user role');
      
      alert('User role updated successfully');
      closeEditModal();
      loadUsers();
    } catch (error) {
      console.error('Error updating user:', error);
      alert(error.message || 'Failed to update user');
    }
  }
  
  async function deleteUser(userId) {
    if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) return;
    
    const token = localStorage.getItem('adminToken');
    if (!token) return;
    
    try {
      const response = await fetch(`${API_BASE}/users/${userId}`, {
        method: 'DELETE',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      });
      
      if (!response.ok) throw new Error('Failed to delete user');
      
      alert('User deleted successfully');
      loadUsers();
    } catch (error) {
      console.error('Error deleting user:', error);
      alert(error.message || 'Failed to delete user');
    }
  }
  
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  
  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.classList.remove('active');
      }
    });
  });
</script>

</body>
</html>
