<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Just Gold</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h1 {
      font-family: 'Unbounded', cursive;
      font-size: 28px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .login-header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: 'Space Grotesk', sans-serif;
      transition: border-color 0.3s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-error {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .form-error.show {
      display: block;
    }

    .login-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .login-button.loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .loader {
      display: none;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    .loader.show {
      display: inline-block;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .api-info {
      background: #f0f4ff;
      padding: 12px;
      border-radius: 6px;
      font-size: 11px;
      color: #666;
      margin-top: 20px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <h1>Just Gold</h1>
    <p>Admin Dashboard</p>
  </div>

  <form id="loginForm">
    <div class="success-message" id="successMessage">
      Login successful! Redirecting...
    </div>

    <div class="form-group">
      <label for="email">Admin Email</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="admin@goldenegg.com"
        required
        autocomplete="email"
      />
      <div class="form-error" id="emailError"></div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter your password"
        required
        autocomplete="current-password"
      />
      <div class="form-error" id="passwordError"></div>
    </div>

    <div class="form-error show" id="generalError" style="margin-bottom: 15px;"></div>

    <button type="submit" class="login-button" id="loginButton">
      <span id="buttonText">Sign In</span>
      <div class="loader" id="buttonLoader"></div>
    </button>
  </form>

  <div class="api-info">
    <strong>API Configuration:</strong><br>
    Local: http://localhost:5000/api/v1<br>
    Production: https://just-gold-backend-render.onrender.com/api/v1
  </div>

  <div class="login-footer">
    <p>Protected Admin Panel</p>
  </div>
</div>

<script>
  const API_BASE = 'http://localhost:5000/api/v1'; // Change for production
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginButton = document.getElementById('loginButton');
  const generalError = document.getElementById('generalError');
  const successMessage = document.getElementById('successMessage');
  const buttonText = document.getElementById('buttonText');
  const buttonLoader = document.getElementById('buttonLoader');

  // Check if already logged in
  if (localStorage.getItem('adminToken')) {
    window.location.href = 'index.html';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Clear errors
    generalError.textContent = '';
    generalError.style.display = 'none';
    document.getElementById('emailError').textContent = '';
    document.getElementById('passwordError').textContent = '';

    // Show loading state
    loginButton.disabled = true;
    loginButton.classList.add('loading');
    buttonText.style.display = 'none';
    buttonLoader.classList.add('show');

    try {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Validate input
      if (!email || !password) {
        throw new Error('Email and password are required');
      }

      // Call backend login endpoint
      const response = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || 'Login failed');
      }

      // Validate response
      if (!data.token) {
        throw new Error('No token received from server');
      }

      // Save token and user info
      localStorage.setItem('adminToken', data.token);
      localStorage.setItem('adminUser', JSON.stringify(data.user || { email }));

      // Show success message
      successMessage.classList.add('show');

      // Redirect after 1 second
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);

    } catch (error) {
      console.error('Login error:', error);
      generalError.textContent = error.message || 'Login failed. Please try again.';
      generalError.style.display = 'block';

      // Reset button state
      loginButton.disabled = false;
      loginButton.classList.remove('loading');
      buttonText.style.display = 'inline';
      buttonLoader.classList.remove('show');
    }
  });
</script>

</body>
</html>
